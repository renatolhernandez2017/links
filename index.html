<!doctype html>
<html lang="pt-BR" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meus Links</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <style>
    * {
      font-family: 'Outfit', sans-serif;
    }

    body {
      margin: 0;
      background: #0f0f0f;
      color: white;
    }

    .link-btn {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .link-btn:hover {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.3);
    }

    .link-btn:active {
      transform: translateY(0) scale(0.98);
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .animate-in {
      animation: fadeUp 0.6s ease forwards;
      opacity: 0;
    }

    .avatar-ring {
      background: conic-gradient(
        from 0deg,
        #f59e0b,
        #ef4444,
        #ec4899,
        #8b5cf6,
        #3b82f6,
        #f59e0b
      );
      padding: 3px;
      border-radius: 9999px;
    }
  </style>
</head>

<body class="min-h-screen flex justify-center">

  <div class="w-full max-w-md px-6 py-12 flex flex-col items-center">

    <!-- Avatar -->
    <div class="avatar-ring mb-4 animate-in" style="animation-delay: 0.1s;">
      <div
        class="w-24 h-24 rounded-full flex items-center justify-center text-3xl"
        style="background: #1a1a2e;"
      >
        👤
      </div>
    </div>

    <!-- Nome -->
    <h1
      class="text-2xl font-bold mb-1 animate-in"
      style="animation-delay: 0.2s;"
    >
      Renato Hernandez
    </h1>

    <!-- Bio -->
    <p
      class="text-sm mb-8 text-gray-400 animate-in text-center"
      style="animation-delay: 0.3s;"
    >
      Criador de conteúdo ✨
    </p>

    <!-- Links -->
    <div class="w-full flex flex-col gap-4">

      <a
        href="https://google.com"
        target="_blank"
        class="link-btn w-full py-4 px-6 rounded-2xl text-center font-medium animate-in bg-[#1e1e3a] border border-purple-400/20"
        style="animation-delay: 0.4s;"
      >
        🌐 Meu Site
      </a>

      <a
        href="https://youtube.com"
        target="_blank"
        class="link-btn w-full py-4 px-6 rounded-2xl text-center font-medium animate-in bg-[#1e1e3a] border border-purple-400/20"
        style="animation-delay: 0.5s;"
      >
        ▶️ YouTube
      </a>

      <a
        href="https://instagram.com"
        target="_blank"
        class="link-btn w-full py-4 px-6 rounded-2xl text-center font-medium animate-in bg-[#1e1e3a] border border-purple-400/20"
        style="animation-delay: 0.6s;"
      >
        📸 Instagram
      </a>

      <a
        href="https://wa.me/5500000000000"
        target="_blank"
        class="link-btn w-full py-4 px-6 rounded-2xl text-center font-medium animate-in bg-[#1e1e3a] border border-purple-400/20"
        style="animation-delay: 0.7s;"
      >
        💬 WhatsApp
      </a>

    </div>

    <p class="mt-10 text-xs text-gray-500">
      Feito com ❤️
    </p>

  </div>

</body>
</html>
